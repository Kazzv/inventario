spring.application.name=inventario

# Puerto de la aplicación
server.port=8080

# Configuración H2 (en memoria)
#spring.datasource.url=jdbc:h2:mem:inventario
#spring.datasource.username=sa
#spring.datasource.password= 
#spring.datasource.driver-class-name=org.h2.Driver
spring.datasource-url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventario}
spring.database-username=${DB_USERNAME:postgres}
spring.database-password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


